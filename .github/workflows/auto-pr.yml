name: Auto PR from main

on:
  push:
    branches: [main]

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create or skip PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_pr=$(gh pr list --head main --base production --state open --json number --jq '.[0].number')

          if [ -n "$existing_pr" ]; then
            echo "PR #${existing_pr} already exists — new commits are included automatically."
          else
            gh pr create \
              --head main \
              --base production \
              --draft \
              --title "feat: changes from main" \
              --body "Automated PR from main branch. Mark as Ready for review when done to trigger CI/CD."
            echo "New PR created."
          fi
