name: Telemetry Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  telemetry-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for telemetry / analytics SDKs
        run: .claude/scripts/check-telemetry.sh
