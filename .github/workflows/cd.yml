name: Vercel CD Pipeline

on:
  push:
    branches:
      - production
  pull_request:
    branches:
      - production

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  Deploy-Preview:
    name: Deploy Preview (Pull Request)
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Strip Git metadata
        run: rm -rf .git

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          preview_url=$(vercel deploy --yes --token=$VERCEL_TOKEN)
          echo "url=$preview_url" >> $GITHUB_OUTPUT

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed!**\n\n🔗 ${{ steps.deploy.outputs.url }}`
            })

  Deploy-Production:
    name: Deploy Production (Main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Strip Git metadata
        run: rm -rf .git

      - name: Deploy to Vercel (Production)
        run: vercel deploy --yes --prod --token=$VERCEL_TOKEN
