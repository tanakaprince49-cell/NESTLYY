name: Vercel CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  detect-changes:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'packages/web/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vercel.json'

  Deploy-Preview:
    name: Deploy Preview (Pull Request)
    needs: detect-changes
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
      && needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Strip Git metadata
        run: rm -rf .git

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          preview_url=$(vercel deploy --yes --token=$VERCEL_TOKEN)
          echo "url=$preview_url" >> $GITHUB_OUTPUT

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed!**\n\n🔗 ${{ steps.deploy.outputs.url }}`
            })

  Skip-Preview:
    name: Deploy Preview (Pull Request)
    needs: detect-changes
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
      && needs.detect-changes.outputs.web != 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment skip reason
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⏭️ **Vercel preview skipped** -- no web/shared changes detected.`
            })

  Deploy-Production:
    name: Deploy Production (Main)
    needs: detect-changes
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Strip Git metadata
        run: rm -rf .git

      - name: Deploy to Vercel (Production)
        run: vercel deploy --yes --prod --token=$VERCEL_TOKEN
