name: Direct Push Guard

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Flag direct push
        if: github.event.head_commit && !startsWith(github.event.head_commit.message, 'Merge pull request')
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const sha = context.sha;
            const shortSha = sha.substring(0, 7);
            const message = context.payload.head_commit.message.split('\n')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Direct push to main: ${shortSha}`,
              body: [
                `@${actor} pushed directly to \`main\` without a pull request.`,
                ``,
                `**Commit:** [\`${shortSha}\`](${context.payload.head_commit.url})`,
                `**Message:** ${message}`,
                ``,
                `Please use a feature branch and open a PR instead.`,
                `This keeps the build green and lets the team review changes before they land.`,
              ].join('\n'),
              assignees: [actor],
            });
