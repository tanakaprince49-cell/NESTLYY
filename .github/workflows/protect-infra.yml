name: Protect infrastructure after merge

on:
  push:
    branches: [production]

jobs:
  restore:
    # Skip if this push was made by the bot itself (avoid infinite loop)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Restore deleted files
        run: |
          # Find all files deleted in this push compared to previous state
          DELETED=$(git diff --name-only --diff-filter=D HEAD~1 HEAD)

          if [ -z "$DELETED" ]; then
            echo "No files deleted. Nothing to restore."
            exit 0
          fi

          echo "Files deleted in this push:"
          echo "$DELETED"

          RESTORED=false
          while IFS= read -r file; do
            echo "Restoring: $file"
            git checkout HEAD~1 -- "$file" 2>/dev/null && RESTORED=true || echo "WARNING: Could not restore $file"
          done <<< "$DELETED"

          if [ "$RESTORED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "fix: auto-restore files deleted by merge from main"
            git push
            echo "Infrastructure files restored."
          else
            echo "No files needed restoration."
          fi
