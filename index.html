<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="apple-mobile-web-app-title" content="Nestly" />
    <meta name="theme-color" content="#ffffff" />

    <link rel="manifest" href="./manifest.json" />
    
    <title>Nestly - Pregnancy Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;500;600;700;800&display=swap" rel="stylesheet">
    <script>

    <style>
      :root {
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --app-width: 500px;
        --rose-main: #f43f5e;
        --nestly-burgundy: #7e1631;
        --soft-bg: #fffaf9;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        scrollbar-width: none;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }
      *::-webkit-scrollbar { display: none; }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: #fdf8f7;
        margin: 0;
        display: flex;
        justify-content: center;
        color: #1e293b;
        line-height: 1.5;
        font-size: 16px;
        overflow-x: hidden;
        overscroll-behavior-y: none;
      }
      #root {
        width: 100%;
        max-width: var(--app-width);
        min-height: 100vh;
        background: var(--soft-bg);
        position: relative;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 100px rgba(126, 22, 49, 0.04);
      }
      .font-serif {
        font-family: 'Fraunces', serif;
        font-variation-settings: "SOFT" 100;
      }
      .glass {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      .card-premium {
        background: #ffffff;
        border-radius: 2.25rem;
        box-shadow: 0 10px 25px -5px rgba(126, 22, 49, 0.03);
        border: 1px solid rgba(254, 242, 242, 0.8);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn-nestly {
        background: var(--nestly-burgundy);
        color: white;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        border-radius: 1.5rem;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .btn-nestly:active, button:active {
        transform: scale(0.96);
        opacity: 0.85;
      }
      
      input, select, textarea {
        font-size: 16px !important;
        background: #ffffff;
        border: 1.5px solid #f1f5f9;
        border-radius: 1.25rem;
        padding: 16px 20px;
        width: 100%;
        color: #0f172a;
        font-weight: 600;
        transition: all 0.3s ease;
        -webkit-appearance: none;
      }
      input:focus {
        border-color: var(--rose-main);
        outline: none;
        box-shadow: 0 0 0 5px rgba(244, 63, 94, 0.05);
      }
      
      @keyframes float {
        0%, 100% { transform: translate3d(0, 0, 0); }
        50% { transform: translate3d(0, -12px, 0); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }

      @keyframes float-teddy {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
        25% { transform: translate3d(10px, -15px, 0) rotate(5deg); }
        50% { transform: translate3d(-5px, -25px, 0) rotate(-5deg); }
        75% { transform: translate3d(-12px, -10px, 0) rotate(3deg); }
      }
      .animate-float-teddy { 
        animation: float-teddy 12s ease-in-out infinite; 
        will-change: transform;
      }

      @keyframes slideUp {
        from { transform: translate3d(0, 20px, 0); opacity: 0; }
        to { transform: translate3d(0, 0, 0); opacity: 1; }
      }
      .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .pwa-tap-fix {
        cursor: pointer;
        user-select: none;
      }
    </style>

        "react-dom": "https://esm.sh/react-dom@^19.2.4",

        "jspdf": "https://esm.sh/jspdf@^2.5.1",
        "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
      }
    }
    </script>
  </head>

    <div id="root"></div>

</html>
