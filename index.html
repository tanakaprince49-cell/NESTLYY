<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nestly" />
    <meta name="theme-color" content="#ffffff" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    
    <title>Nestly - Pregnancy Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              rose: {
                50: 'var(--soft-bg)',
                100: 'var(--theme-100)',
                400: 'var(--rose-main)',
                500: 'var(--rose-main)',
                600: 'var(--rose-main)',
                700: 'var(--nestly-burgundy)',
                800: 'var(--nestly-burgundy)',
                900: 'var(--nestly-burgundy)',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      window.process = { env: { NODE_ENV: 'production' } };
    </script>
    <style>
      :root {
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --app-width: 500px;
        --rose-main: #f43f5e;
        --nestly-burgundy: #7e1631;
        --soft-bg: #fffaf9;
        --body-bg: #fdf8f7;
        --theme-100: #ffe4e6;
        --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        scrollbar-width: none;
        transition-timing-function: var(--transition-smooth);
      }
      *::-webkit-scrollbar { display: none; }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: var(--body-bg);
        margin: 0;
        display: flex;
        justify-content: center;
        color: #1e293b;
        line-height: 1.5;
        font-size: 16px;
        overflow-x: hidden;
        overscroll-behavior-y: none;
        transition: background-color 0.5s ease;
      }
      #root {
        width: 100%;
        max-width: var(--app-width);
        min-height: 100vh;
        background: var(--soft-bg);
        position: relative;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 100px rgba(126, 22, 49, 0.04);
        transition: background-color 0.5s ease;
      }
      .font-serif {
        font-family: 'Fraunces', serif;
        font-variation-settings: "SOFT" 100;
      }
      .glass {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(30px) saturate(150%);
        -webkit-backdrop-filter: blur(30px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
      }
      .card-premium {
        background: rgba(255, 255, 255, 0.5) !important;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 2.25rem;
        box-shadow: 0 10px 30px -5px rgba(126, 22, 49, 0.05), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.6) !important;
        transition: all 0.4s var(--transition-smooth);
      }
      .card-premium:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px -5px rgba(126, 22, 49, 0.06);
      }
      .btn-nestly {
        background: var(--nestly-burgundy);
        color: white;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        border-radius: 1.5rem;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .btn-nestly:active, button:active {
        transform: scale(0.96);
        opacity: 0.85;
      }
      
      input, select, textarea {
        font-size: 16px !important;
        background: #ffffff;
        border: 1.5px solid #f1f5f9;
        border-radius: 1.25rem;
        padding: 16px 20px;
        width: 100%;
        color: #0f172a;
        font-weight: 600;
        transition: all 0.3s ease;
        -webkit-appearance: none;
      }
      input:focus {
        border-color: var(--rose-main);
        outline: none;
        box-shadow: 0 0 0 5px rgba(244, 63, 94, 0.05);
      }
      
      @keyframes float {
        0%, 100% { transform: translate3d(0, 0, 0); }
        50% { transform: translate3d(0, -12px, 0); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }

      @keyframes float-teddy {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
        25% { transform: translate3d(10px, -15px, 0) rotate(5deg); }
        50% { transform: translate3d(-5px, -25px, 0) rotate(-5deg); }
        75% { transform: translate3d(-12px, -10px, 0) rotate(3deg); }
      }
      .animate-float-teddy { 
        animation: float-teddy 12s ease-in-out infinite; 
        will-change: transform;
      }

      @keyframes slideUp {
        from { transform: translate3d(0, 20px, 0); opacity: 0; }
        to { transform: translate3d(0, 0, 0); opacity: 1; }
      }
      .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .pwa-tap-fix {
        cursor: pointer;
        user-select: none;
      }

      /* Theme specific overrides */
      .theme-pink {
        --rose-main: #f43f5e;
        --nestly-burgundy: #7e1631;
        --soft-bg: #fffaf9;
        --body-bg: #fdf8f7;
        --theme-100: #ffe4e6;
      }
      .theme-blue {
        --rose-main: #3b82f6;
        --nestly-burgundy: #1e3a8a;
        --soft-bg: #f0f9ff;
        --body-bg: #f8fafc;
        --theme-100: #dbeafe;
      }
      .theme-neutral {
        --rose-main: #64748b;
        --nestly-burgundy: #1e293b;
        --soft-bg: #f8fafc;
        --body-bg: #f1f5f9;
        --theme-100: #f1f5f9;
      }
      .theme-orange {
        --rose-main: #f97316;
        --nestly-burgundy: #7c2d12;
        --soft-bg: #fff7ed;
        --body-bg: #fffaf5;
        --theme-100: #ffedd5;
      }
      .theme-sage {
        --rose-main: #10b981;
        --nestly-burgundy: #064e3b;
        --soft-bg: #f0fdf4;
        --body-bg: #f7fee7;
        --theme-100: #d1fae5;
      }
      .theme-lavender {
        --rose-main: #8b5cf6;
        --nestly-burgundy: #4c1d95;
        --soft-bg: #f5f3ff;
        --body-bg: #faf5ff;
        --theme-100: #ede9fe;
      }
      .theme-sand {
        --rose-main: #d97706;
        --nestly-burgundy: #78350f;
        --soft-bg: #fefce8;
        --body-bg: #fffbeb;
        --theme-100: #fef08a;
      }
      .theme-mint {
        --rose-main: #34d399;
        --nestly-burgundy: #065f46;
        --soft-bg: #f0fdfa;
        --body-bg: #f9fefc;
        --theme-100: #ccfbf1;
      }
      .theme-sky {
        --rose-main: #38bdf8;
        --nestly-burgundy: #075985;
        --soft-bg: #f0f9ff;
        --body-bg: #f9fcff;
        --theme-100: #e0f2fe;
      }
      .theme-peach {
        --rose-main: #fb923c;
        --nestly-burgundy: #9a3412;
        --soft-bg: #fff7ed;
        --body-bg: #fffbf9;
        --theme-100: #ffedd5;
      }
      .theme-lilac {
        --rose-main: #c084fc;
        --nestly-burgundy: #6b21a8;
        --soft-bg: #fdf4ff;
        --body-bg: #fefaff;
        --theme-100: #f3e8ff;
      }
      .theme-stone {
        --rose-main: #a8a29e;
        --nestly-burgundy: #44403c;
        --soft-bg: #f5f5f4;
        --body-bg: #fafaf9;
        --theme-100: #e7e5e4;
      }

      /* Lifecycle specific overrides (can combine with colors) */
      .stage-newborn {
        /* Subtle shifts for newborn stage */
      }

    </style>
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-qu38XzloqDhefv3GNak5F.js"></script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
